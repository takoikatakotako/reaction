name: Test iOS

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ios/**
    branches:
      - main
      - develop

jobs:
  test_ios:
    name: test ios
    runs-on: macos-15

    steps:
    # チェックアウト
    - name: Checkout
      uses: actions/checkout@v4

    # Mintのインストール
    - name: Install Mint
      run: brew install mint

    # Mintのキャッシュの取得
    - name: Cache Mint packages
      uses: actions/cache@v4
      with:
        path: ios/.mint
        key: ${{ runner.os }}-mint-${{ hashFiles('ios/Mintfile') }}
        restore-keys: |
          ${{ runner.os }}-mint-

    # Mintで管理しているライブラリのインストール
    - name: Install Mint packages
      working-directory: ios
      run: mint bootstrap

    # SwiftLintによるチェック
    - name: SwiftLint
      working-directory: ios
      run: mint run swiftlint swiftlint --strict
